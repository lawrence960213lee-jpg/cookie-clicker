<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Clicker - 競速版</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        input { -webkit-user-select: text; user-select: text; }
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); background-attachment: fixed; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 40px 0; color: #fff; overflow-y: auto; }
        .glass-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 30px; padding: 35px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6); text-align: center; width: 90%; max-width: 600px; margin: 20px auto; display: none; }
        .active-panel { display: block; animation: zoomIn 0.5s ease; }
        .cookie-container { position: relative; display: inline-block; margin: 20px 0; cursor: pointer; }
        .cookie-btn { font-size: 100px; filter: drop-shadow(0 0 25px rgba(255, 200, 100, 0.5)); transition: transform 0.1s; pointer-events: none; }
        .cookie-container:active .cookie-btn { transform: scale(0.9); }
        .stats-board { background: rgba(0, 0, 0, 0.4); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .store-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); color: #222; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #444; color: #777; opacity: 0.6; }
        .leaderboard-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: rgba(255,255,255,0.1); color: white; border-radius: 10px; }
        .tab-btn.active { background: #f39c12; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .mode-indicator { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; margin-bottom: 10px; background: #667eea; }
        .speedrun-active { background: #ff4757; box-shadow: 0 0 15px #ff4757; }
        .timer-display { font-family: monospace; font-size: 24px; color: #ff4757; margin-bottom: 10px; }
        .floating-text { position: absolute; color: #ffd700; font-weight: bold; font-size: 28px; pointer-events: none; animation: floatUp 0.8s forwards; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-80px); opacity: 0; } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="authPanel" class="glass-panel active-panel">
        <h1>🌠 餅乾宇宙帝國</h1>
        <p style="font-size: 12px; color: #aaa;">競速</p>
        <input type="text" id="usernameInput" placeholder="指揮官帳號" style="width:80%; padding:10px; margin-top:20px; border-radius:8px;">
        <input type="password" id="passwordInput" placeholder="密鑰" style="width:80%; padding:10px; margin-top:10px; border-radius:8px;">
        <div style="margin-top: 20px;">
            <button id="loginBtn">進入帝國</button>
            <button id="regBtn" style="background: #38d39f;">建立身分</button>
        </div>
        <div id="authMessage" style="color: #ff6b6b; margin-top: 15px;"></div>
    </div>

    <div id="gamePanel" class="glass-panel">
        <div id="modeTag" class="mode-indicator">無盡模式</div>
        <div id="speedrunTimer" class="timer-display" style="display:none;">00:00.00</div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span id="greeting" style="color: #f6d365;"></span>
            <button id="toggleModeBtn" style="font-size:12px;">切換為競速模式</button>
        </div>
        
        <div class="cookie-container" id="cookieArea">
            <div class="cookie-btn">🍪</div>
        </div>
        
        <div class="stats-board">
            <p id="cookieLabel" style="font-size: 14px; color: #aaa;">當前持有</p>
            <h2 style="font-size: 42px;">🍪 <span id="cookieCount">0</span></h2>
            <div id="endlessStats">
                <p style="font-size: 13px; color: #f6d365;">歷史總產出：<span id="totalCookieCount">0</span></p>
            </div>
            <p id="targetMsg" style="font-size: 12px; color: #ff4757; display:none; margin-top: 5px;">目標：1,000 餅乾！</p>
        </div>

        <div class="store-section">
            <button id="btnUpgradeClick">🖱️ 強化滑鼠<br><small>💰 <span id="clickCost">50</span></small></button>
            <button id="btnBuyAuto">👵 聘僱奶奶<br><small>💰 <span id="autoCost">100</span></small></button>
        </div>

        <button id="openRankBtn" style="width:100%; margin-top:20px; background: #f39c12;">🏆 全球排行榜</button>
        <button onclick="location.reload()" style="background:#ff6b6b; margin-top:10px; font-size:10px;">登出</button>
    </div>

    <div id="leaderboardPanel" class="glass-panel">
        <h2>🏆 帝國榮譽榜</h2>
        <div class="leaderboard-tabs">
            <button class="tab-btn active" id="tabEndless">總產量榜</button>
            <button class="tab-btn" id="tabSpeed">競速(1K)榜</button>
        </div>
        <table>
            <thead><tr><th>#</th><th>指揮官</th><th id="rankTitle">總產量</th></tr></thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
        <button id="backGameBtn" style="margin-top:20px; width:100%;">回到指揮部</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        // 1. Firebase 初始化
        const firebaseConfig = {
            apiKey: "AIzaSyADpYSJQK5SOdacs--Dcf3p8hYJoPbLaAI",
            authDomain: "cookieclicker-e11f3.firebaseapp.com",
            databaseURL: "https://cookieclicker-e11f3-default-rtdb.firebaseio.com",
            projectId: "cookieclicker-e11f3",
            storageBucket: "cookieclicker-e11f3.firebasestorage.app",
            messagingSenderId: "870806034821",
            appId: "1:870806034821:web:dcc8f2ac8d020c4bdc4cec"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. 遊戲變數
        let currentUser = null;
        let userData = null; // 儲存無盡模式資料
        let isSpeedrunMode = false;
        let speedData = { cookies: 0, clickPower: 1, clickCost: 50, autoClickers: 0, autoCost: 100 };
        let speedrunStartTime = null;
        let speedrunTimerInterval = null;
        let hasFinishedSpeedrun = false;

        function showPanel(id) {
            document.querySelectorAll('.glass-panel').forEach(p => p.classList.remove('active-panel'));
            document.getElementById(id).classList.add('active-panel');
        }

        // --- 核心邏輯 ---
        function formatTime(ms) {
            let s = Math.floor(ms / 1000);
            let m = Math.floor(s / 60);
            s = s % 60;
            let mm = Math.floor((ms % 1000) / 10);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}.${mm.toString().padStart(2, '0')}`;
        }

        function updateUI() {
            if(!userData) return;
            const target = isSpeedrunMode ? speedData : userData;
            
            document.getElementById('cookieCount').innerText = Math.floor(target.cookies).toLocaleString();
            document.getElementById('clickCost').innerText = target.clickCost.toLocaleString();
            document.getElementById('autoCost').innerText = target.autoCost.toLocaleString();
            
            document.getElementById('btnUpgradeClick').disabled = target.cookies < target.clickCost;
            document.getElementById('btnBuyAuto').disabled = target.cookies < target.autoCost;

            if(!isSpeedrunMode) {
                document.getElementById('totalCookieCount').innerText = Math.floor(target.totalCookies).toLocaleString();
            }
        }

        function saveToCloud() {
            if(currentUser && userData && !isSpeedrunMode) {
                db.ref('users/' + currentUser).set(userData);
            }
        }

        // --- 模式切換 ---
        document.getElementById('toggleModeBtn').onclick = () => {
            if(confirm("切換模式會重置本次點擊進度，確定嗎？")) {
                isSpeedrunMode = !isSpeedrunMode;
                resetMode();
            }
        };

        function resetMode() {
            clearInterval(speedrunTimerInterval);
            if (isSpeedrunMode) {
                speedData = { cookies: 0, clickPower: 1, clickCost: 50, autoClickers: 0, autoCost: 100 };
                speedrunStartTime = null;
                hasFinishedSpeedrun = false;
                document.getElementById('modeTag').innerText = "競速模式 (目標1,000)";
                document.getElementById('modeTag').classList.add('speedrun-active');
                document.getElementById('speedrunTimer').innerText = "00:00.00";
                document.getElementById('speedrunTimer').style.display = "block";
                document.getElementById('targetMsg').style.display = "block";
                document.getElementById('endlessStats').style.display = "none";
                document.getElementById('toggleModeBtn').innerText = "回到無盡模式";
            } else {
                document.getElementById('modeTag').innerText = "無盡模式";
                document.getElementById('modeTag').classList.remove('speedrun-active');
                document.getElementById('speedrunTimer').style.display = "none";
                document.getElementById('targetMsg').style.display = "none";
                document.getElementById('endlessStats').style.display = "block";
                document.getElementById('toggleModeBtn').innerText = "切換為競速模式";
            }
            updateUI();
        }

        // --- 點擊與升級 ---
        document.getElementById('cookieArea').onclick = (e) => {
            if(!userData) return;
            const target = isSpeedrunMode ? speedData : userData;
            
            if (isSpeedrunMode) {
                if(hasFinishedSpeedrun) return;
                if(!speedrunStartTime) {
                    speedrunStartTime = Date.now();
                    speedrunTimerInterval = setInterval(() => {
                        document.getElementById('speedrunTimer').innerText = formatTime(Date.now() - speedrunStartTime);
                    }, 10);
                }
                target.cookies += target.clickPower;
                if(target.cookies >= 1000) finishSpeedrun();
            } else {
                target.cookies += target.clickPower;
                target.totalCookies += target.clickPower;
            }

            // 浮動文字
            const rect = e.currentTarget.getBoundingClientRect();
            const t = document.createElement('div'); t.className = 'floating-text'; t.innerText = '+'+target.clickPower;
            t.style.left = (e.clientX - rect.left) + 'px'; t.style.top = (e.clientY - rect.top) + 'px';
            e.currentTarget.appendChild(t); setTimeout(()=>t.remove(), 800);
            updateUI();
        };

        async function finishSpeedrun() {
            hasFinishedSpeedrun = true;
            clearInterval(speedrunTimerInterval);
            const finalTime = Date.now() - speedrunStartTime;
            if (!userData.bestSpeedrunTime || finalTime < userData.bestSpeedrunTime) {
                userData.bestSpeedrunTime = finalTime;
                alert(`🏆 新紀錄！用時：${formatTime(finalTime)}`);
                saveToCloud();
            } else {
                alert(`挑戰完成！用時：${formatTime(finalTime)}`);
            }
        }

        document.getElementById('btnUpgradeClick').onclick = () => {
            const target = isSpeedrunMode ? speedData : userData;
            if(target.cookies >= target.clickCost) {
                target.cookies -= target.clickCost;
                target.clickPower++;
                target.clickCost = Math.floor(target.clickCost * 1.5);
                updateUI();
                saveToCloud();
            }
        };

        document.getElementById('btnBuyAuto').onclick = () => {
            const target = isSpeedrunMode ? speedData : userData;
            if(target.cookies >= target.autoCost) {
                target.cookies -= target.autoCost;
                target.autoClickers++;
                target.autoCost = Math.floor(target.autoCost * 1.3);
                updateUI();
                saveToCloud();
            }
        };

        // --- 登入與排行 ---
        document.getElementById('loginBtn').onclick = async () => {
            const user = document.getElementById('usernameInput').value.trim();
            const pass = document.getElementById('passwordInput').value;
            if(!user || !pass) return;
            const snapshot = await db.ref('users/' + user).once('value');
            const data = snapshot.val();
            if (data && data.password === pass) {
                currentUser = user; userData = data;
                document.getElementById('greeting').innerText = `指揮官: ${user}`;
                showPanel('gamePanel'); updateUI();
                setInterval(() => {
                    if(userData) {
                        const target = isSpeedrunMode ? speedData : userData;
                        if(isSpeedrunMode && hasFinishedSpeedrun) return;
                        target.cookies += target.autoClickers / 10;
                        if(!isSpeedrunMode) target.totalCookies += target.autoClickers / 10;
                        if(isSpeedrunMode && target.cookies >= 1000) finishSpeedrun();
                        updateUI();
                    }
                }, 100);
                setInterval(saveToCloud, 5000);
            } else { alert("帳號或密鑰錯誤"); }
        };

        document.getElementById('regBtn').onclick = async () => {
            const user = document.getElementById('usernameInput').value.trim();
            const pass = document.getElementById('passwordInput').value;
            if(!user || !pass) return;
            const snapshot = await db.ref('users/' + user).once('value');
            if(snapshot.exists()) { alert("此帳號已被佔用"); }
            else {
                await db.ref('users/' + user).set({ password: pass, cookies: 0, totalCookies: 0, clickPower: 1, clickCost: 50, autoClickers: 0, autoCost: 100, bestSpeedrunTime: null });
                alert("建立成功，請登入！");
            }
        };

        const renderRank = async (mode) => {
            const snapshot = await db.ref('users').once('value');
            const all = snapshot.val();
            let list = Object.keys(all).map(k => ({ name: k, ...all[k] }));
            const body = document.getElementById('leaderboardBody');
            body.innerHTML = "";
            
            if(mode === 'endless') {
                document.getElementById('rankTitle').innerText = "總產量";
                list.sort((a,b) => b.totalCookies - a.totalCookies);
                body.innerHTML = list.slice(0,10).map((p,i) => `<tr><td>${i+1}</td><td>${p.name}</td><td>${Math.floor(p.totalCookies).toLocaleString()}</td></tr>`).join('');
            } else {
                document.getElementById('rankTitle').innerText = "最佳用時";
                list = list.filter(p => p.bestSpeedrunTime).sort((a,b) => a.bestSpeedrunTime - b.bestSpeedrunTime);
                body.innerHTML = list.slice(0,10).map((p,i) => `<tr><td>${i+1}</td><td>${p.name}</td><td>${formatTime(p.bestSpeedrunTime)}</td></tr>`).join('');
            }
        };

        document.getElementById('tabEndless').onclick = () => {
            document.getElementById('tabEndless').classList.add('active');
            document.getElementById('tabSpeed').classList.remove('active');
            renderRank('endless');
        };
        document.getElementById('tabSpeed').onclick = () => {
            document.getElementById('tabSpeed').classList.add('active');
            document.getElementById('tabEndless').classList.remove('active');
            renderRank('speedrun');
        };
        document.getElementById('openRankBtn').onclick = () => {
            showPanel('leaderboardPanel');
            document.getElementById('tabEndless').click();
        };
        document.getElementById('backGameBtn').onclick = () => showPanel('gamePanel');

    </script>
</body>
</html>
